<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Multi Viewer</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .form-wrap {
            max-width: 900px;
            margin: 0 auto 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 28px 24px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        .input-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: stretch;
        }

        .input-row input[type="text"] {
            flex: 1 1 260px;
            min-width: 0;
        }

        .input-row input[type="number"] {
            width: 80px;
            flex: 0 0 80px;
        }

        .input-row select {
            flex: 1 1 140px;
            min-width: 0;
        }

        input, select {
            padding: 11px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            font-size: 15px;
            background: rgba(255,255,255,0.07);
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder { color: #64748b; }
        input:focus, select:focus { border-color: #38bdf8; }

        select option { background: #1e293b; color: #fff; }

        button {
            padding: 11px 26px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            flex: 0 0 auto;
        }

        button:hover { background: #dc2626; transform: translateY(-1px); }

        #players {
            max-width: 1400px;
            margin: 0 auto;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
        }

        .player-slot {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            cursor: pointer;
        }

        /* L'iframe occupa tutto lo slot */
        .player-slot > div,
        .player-slot iframe {
            position: absolute !important;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
        }

        @media (max-width: 1100px) {
            #players { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 700px) {
            #players { grid-template-columns: repeat(2, 1fr); }
            .input-row input[type="number"] { width: 70px; flex: 0 0 70px; }
        }
        @media (max-width: 440px) {
            #players { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="form-wrap">
    <h1>YouTube Multi Viewer</h1>
    <div class="input-row">
        <input type="text" id="videoUrl" placeholder="Incolla URL YouTube...">
        <input type="number" id="viewCount" value="4" min="1" max="30">
        <select id="audioSetting">
            <option value="1">Muto</option>
            <option value="0">Audio attivo</option>
        </select>
        <select id="qualitySetting">
            <option value="default">Auto</option>
            <option value="small">240p</option>
            <option value="medium">360p</option>
            <option value="large">480p</option>
            <option value="hd720">720p</option>
            <option value="hd1080">1080p</option>
        </select>
        <button onclick="startMultiView()">Genera Player</button>
    </div>
</div>

<div id="players"></div>

<script>
    /* ── Estrae l'ID dal URL YouTube (long, short, shorts) ── */
    function getVideoId(url) {
        const r = /(?:youtu\.be\/|v=|\/v\/|embed\/|shorts\/)([A-Za-z0-9_-]{11})/;
        const m = url.match(r);
        return m ? m[1] : null;
    }

    /* ── Pool di oggetti YT.Player indicizzati ── */
    const players = {};

    function startMultiView() {
        const url      = document.getElementById('videoUrl').value.trim();
        const count    = Math.min(parseInt(document.getElementById('viewCount').value) || 1, 30);
        const isMuted  = document.getElementById('audioSetting').value === '1';
        const quality  = document.getElementById('qualitySetting').value;
        const videoId  = getVideoId(url);

        if (!videoId) { alert('URL YouTube non valido.'); return; }

        const container = document.getElementById('players');
        container.innerHTML = '';
        container.style.display = 'grid';

        /* Pulisce i player precedenti */
        Object.keys(players).forEach(k => {
            try { players[k].destroy(); } catch(e) {}
            delete players[k];
        });

        for (let i = 0; i < count; i++) {
            // Ritardo progressivo per ingannare l'anti-spam. 1500 millisecondi (1.5s) tra un player e l'altro.
            setTimeout(() => {
                /* Slot esterno */
                const slot = document.createElement('div');
                slot.className = 'player-slot';
                slot.id = 'slot-' + i;

                /* Div target per YT.Player */
                const target = document.createElement('div');
                target.id = 'ytplayer-' + i;
                slot.appendChild(target);

                container.appendChild(slot);

                /* Crea il player senza autoplay:
                   - autoplay:0 → non parte da solo (nessun bot signal)
                   - Il play avviene solo via click diretto sul player nativo */
                players[i] = new YT.Player('ytplayer-' + i, {
                    videoId: videoId,
                    playerVars: {
                        autoplay:        0,
                        mute:            isMuted ? 1 : 0,
                        controls:        1,
                        rel:             0,
                        modestbranding:  1,
                        playsinline:     1,
                        /* origin deve corrispondere al dominio reale della pagina */
                        origin:          location.origin || 'https://pooreyoutuber.github.io',
                        enablejsapi:     1
                    },
                    events: {
                        onReady: (function(idx, q, m) {
                            return function(e) {
                                e.target.setPlaybackQuality(q);
                                /* Imposta una velocità leggermente variabile per ogni slot */
                                const rates = [0.75, 1, 1, 1, 1.25];
                                e.target.setPlaybackRate(rates[idx % rates.length]);
                                if (m) { e.target.mute(); }
                            };
                        })(i, quality, isMuted),

                        onStateChange: (function(idx, q) {
                            return function(e) {
                                /* Mantieni la qualità selezionata durante la riproduzione */
                                if (e.data === YT.PlayerState.PLAYING) {
                                    e.target.setPlaybackQuality(q);
                                }
                            };
                        })(i, quality)
                    }
                });
            }, i * 1500); // <-- Moltiplica i millisecondi per l'indice del ciclo
        }
    }
</script>
</body>
</html>
