<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertitore Storico Euro - Lire con Inflazione</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-dark: #0369a1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            margin-top: 0;
            text-align: center;
            color: var(--primary);
        }

        p.subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
        }

        .result-box {
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
            display: none;
        }

        .result-title {
            font-size: 13px;
            color: #166534;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 20px;
            font-weight: 700;
            color: #14532d;
        }

        .info-text {
            font-size: 12px;
            color: #64748b;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Euro ↔ Lire Storico</h1>
    <p class="subtitle">Calcola il valore reale della moneta includendo la svalutazione e l'inflazione storica italiana.</p>

    <div class="form-group">
        <label for="direction">Tipo di conversione</label>
        <select id="direction" onchange="convert()">
            <option value="eurToLit">Da Euro di oggi a Lire del passato</option>
            <option value="litToEur">Da Lire del passato a Euro di oggi</option>
        </select>
    </div>

    <div class="form-group">
        <label for="amount">Importo</label>
        <input type="number" id="amount" placeholder="Inserisci la cifra..." min="0" step="0.01" oninput="convert()">
    </div>

    <div class="form-group">
        <label for="year">Anno di riferimento del passato</label>
        <select id="year" onchange="convert()">
            <!-- I coefficienti simulano la svalutazione/rivalutazione storica rispetto all'introduzione dell'Euro -->
            <option value="2001">2001 (Ultimo anno della Lira)</option>
            <option value="1995">1995</option>
            <option value="1990">1990</option>
            <option value="1985">1985</option>
            <option value="1980">1980</option>
            <option value="1970">1970</option>
            <option value="1960">1960</option>
        </select>
    </div>

    <div class="result-box" id="resultBox">
        <div class="result-title" id="resultTitle">Risultato della conversione</div>
        <div class="result-value" id="resultValue">-</div>
        <div class="info-text" id="infoText"></div>
    </div>
</div>

<script>
    // Coefficienti di rivalutazione monetaria basati su dati storici ISTAT 
    // (Valore che un milione di lire dell'anno X ha nei confronti del potere d'acquisto al momento del cambio del 2002)
    const inflationCoefficients = {
        "2001": 1.02,
        "1995": 1.28,
        "1990": 1.62,
        "1985": 2.24,
        "1980": 3.95,
        "1970": 11.20,
        "1960": 21.80
    };

    const CHANGE_RATE = 1936.27;

    function convert() {
        const direction = document.getElementById('direction').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const year = document.getElementById('year').value;
        
        const resultBox = document.getElementById('resultBox');
        const resultValue = document.getElementById('resultValue');
        const infoText = document.getElementById('infoText');

        if (isNaN(amount) || amount <= 0) {
            resultBox.style.display = 'none';
            return;
        }

        resultBox.style.display = 'block';
        const coef = inflationCoefficients[year];

        if (direction === "eurToLit") {
            // Da Euro di oggi a Lire del passato (considerando la perdita di potere d'acquisto)
            // Più si va indietro, più i prezzi nominali erano bassi, quindi servivano "meno" lire per lo stesso potere d'acquisto
            const lireFisse = amount * CHANGE_RATE;
            const lireStoriche = lireFisse / coef;

            resultValue.innerText = Math.round(lireStoriche).toLocaleString('it-IT') + " Lire";
            infoText.innerText = `Spiegazione: ${amount.toLocaleString('it-IT')} € di oggi corrispondono come potere d'acquisto a circa ${Math.round(lireStoriche).toLocaleString('it-IT')} Lire nel ${year}. Al tasso fisso senza inflazione sarebbero state invece ${Math.round(lireFisse).toLocaleString('it-IT')} Lire.`;
        
        } else {
            // Da Lire del passato a Euro di oggi (Rivalutazione del potere d'acquisto di quelle vecchie Lire)
            const euroFissi = amount / CHANGE_RATE;
            const euroOggi = euroFissi * coef;

            resultValue.innerText = euroOggi.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
            infoText.innerText = `Spiegazione: Chi possedeva ${amount.toLocaleString('it-IT')} Lire nel ${year}, oggi avrebbe un potere d'acquisto equivalente a ben ${euroOggi.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} €. Il semplice cambio fisso senza inflazione calcolerebbe solo ${euroFissi.toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} €.`;
        }
    }
</script>

</body>
</html>
